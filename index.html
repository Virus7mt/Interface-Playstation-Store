<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playstation Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- CAIXA USADA PARA ARMAZENAR -->
    <div class="container">
        <!-- OUTRA CAIXA MENOR, USADA COMO MENU DE NAVEGAÇÃO -->
        <div class="navbar">
            <!-- "./" É USADO PARA PEGAR ITENS DE OUTROS ARQUIVO -->
            <img class="logo" src="./img/logo.png" alt="logo">
            <!-- MENU DE NAVEGAÇÃO -->
            <nav>
                <!-- LISTA -->
                <ul id="menu-list">
                    <!-- ITENS DA LISTA -->
                    <!-- <A> É O LINK -->
                    <li class="nav-li"><a class="nav-link">Consoles</a></li>
                    <li class="nav-li"><a class="nav-link">Acessórios</a></li>
                    <li class="nav-li"><a class="nav-link">Controles</a></li>
                    <li class="nav-li"><a class="nav-link">Outros</a></li>
                </ul>
             </nav>
                                                               <!-- TODA VEZ QUE TOCA NA IMAGEM CHAMA ESSA FUNÇÃO -->
            <img src="./img/menu.png" alt="botao-menu" class="menu-icon" onclick="showMenu()">
        </div>

        <div class="row">
            <div class="column-1">
                <h2>PS5 Dualshock</h2>
                <h3>Wireless Controler for Playstation</h3>
                <p>Controle Original</p>
                <h4>R$ 222,50</h4>
                <button class="buy">Comprar agora <img src="./img/arrow.png" alt="seta"></button>
            </div>

            <div class="column-2">
                <img class="controller" src="./img/controller.png" alt="controle">
                <div class="color-box"></div>
                <button class="add-cart">
                    <img src="./img/add.png" alt="adicionar-ao-carrinho">
                </button>
            </div>
        </div>

        <div class="social-links">
            <img src="./img/fb.png">
            <img src="./img/ig.png">
            <img src="./img/tw.png">
        </div>

    </div>
</body>
<script>
    // VARIAVEL(ARMAZENA DADOS)
    const menuList = document.getElementById("menu-list")
    menuList.style.maxHeight = "0px"

    // FUNÇÃO É UM TRECHO DO CÓDIGO QUE SÓ É CHAMADO QUANDO FAZ ALGUMA AÇÃO
    function showMenu(){
                                // DOIS IGUAIS É UMA COMPARAÇÃO PARA VERIFICAR
        if(menuList.style.maxHeight == "0px"){
                                // UM IGUAL INDICA QUE ESTÁ ATRIBUINDO UM VALOR
           menuList.style.maxHeight = "120px"
        } else {
           menuList.style.maxHeight = "0px"
        }
    }
</script>

</html>
